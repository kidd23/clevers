<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<script src="page-flip.browser.js"></script>

<style>

body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f0f0f0;
}

#flipbook{
width:900px;
height:600px;
}

.page{
background:white;
}

.page img{
width:100%;
height:100%;
object-fit:cover;
}

</style>

</head>

<body>

<div id="flipbook">

<div class="page">
<img src="images/page1.jpg">
</div>

<div class="page">
<img src="images/page2.jpg">
</div>

<div class="page">
<img src="images/page3.jpg">
</div>

</div>

<script>

const pageFlip = new St.PageFlip(
document.getElementById("flipbook"),
{
width:450,
height:600,
showCover:true
}
);

pageFlip.loadFromHTML(
document.querySelectorAll(".page")
);

</script>

</body>

</html>
